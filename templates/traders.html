{{template "base.html" .}}

{{define "content"}}
<div class="auth-card card">
  <h2 style="margin-bottom:20px">Login Trader</h2>
  <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:30px">
    Simulator ini menggunakan sistem login sederhana berdasarkan username yang sudah di-seed.
  </p>

  <form method="POST" action="/login">
    <div class="form-group">
      <label>Pilih Trader</label>
      <select name="username" class="input-glass" style="padding:12px; font-size:1rem">
        {{range .Traders}}
          <option value="{{.Username}}">{{.FullName}} ({{.Username}})</option>
        {{end}}
      </select>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:1.1rem; margin-top:15px">LOGIN</button>
  </form>
</div>

<div class="card" style="margin-top:40px">
  <h3 style="margin-bottom:15px">Daftar Trader</h3>
  <table class="table-glass">
    <thead>
      <tr>
        <th>Username</th>
        <th>Nama Lengkap</th>
        <th class="text-right">Kas (Rp)</th>
      </tr>
    </thead>
    <tbody>
      {{range .Traders}}
      <tr>
        <td style="font-weight:bold">{{.Username}}</td>
        <td style="color:var(--text-muted)">{{.FullName}}</td>
        <td class="text-right num" style="color:var(--accent-green)">{{fmtRupiah .CashBalance}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
