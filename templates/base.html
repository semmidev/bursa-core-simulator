<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEI Exchange Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <nav class="glass-nav">
    <div style="display:flex; align-items:center; gap:20px">
      <div style="font-weight:700; font-size:1.2rem; letter-spacing:0.05em">BEI<span style="color:var(--accent-color)">⚡</span>EXCHANGE</div>
      <div class="nav-links">
        <a href="/market" class="nav-link {{if eq .Path "/market"}}active{{end}}">Market</a>
        <a href="/orderbook" class="nav-link {{if eq .Path "/orderbook"}}active{{end}}">Trade</a>
        <a href="/portfolio" class="nav-link {{if eq .Path "/portfolio"}}active{{end}}">Portfolio</a>
        <a href="/orders" class="nav-link {{if eq .Path "/orders"}}active{{end}}">Orders</a>
        <a href="/traders" class="nav-link {{if eq .Path "/traders"}}active{{end}}">Traders</a>
      </div>
    </div>
    
    <div style="display:flex; align-items:center; gap:15px">
      {{if .User}}
        <div style="font-size:0.9rem; color:var(--text-muted)">
          <span style="color:var(--text-main); font-weight:600">{{.User.Username}}</span> | 
          Kas: <span style="color:var(--green); font-family:var(--font-mono)">{{fmtRupiah .User.CashBalance}}</span>
        </div>
        <form method="POST" action="/logout" style="margin:0">
          <button type="submit" class="btn" style="background:rgba(255,255,255,0.1); color:#fff; padding:6px 12px; font-size:0.8rem">LOGOUT</button>
        </form>
      {{else}}
        <a href="/traders" class="btn" style="background:rgba(255,255,255,0.1); color:#fff; padding:6px 12px; font-size:0.8rem">LOGIN</a>
      {{end}}
    </div>
  </nav>

  <div class="container">
    {{block "content" .}}{{end}}
  </div>

  <script>
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws`);
    
    ws.onmessage = function(evt) {
      const msg = JSON.parse(evt.data);
      if (typeof window.onWSMessage === 'function') {
        window.onWSMessage(msg);
      }
      
      // Auto update header cash if trader
      if (msg.event && msg.event.startsWith('trader:')) {
        const tid = msg.event.split(':')[1];
        {{if .User}}
        if ('{{.User.ID}}' === tid) {
           location.reload(); // Quick refresh to update cash in header
        }
        {{end}}
      }
    };
    
    function formatRupiah(num) {
      return new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR', minimumFractionDigits: 0}).format(num);
    }
  </script>
</body>
</html>
