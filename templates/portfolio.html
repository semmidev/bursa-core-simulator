{{template "base.html" .}}

{{define "content"}}
<div class="card" style="max-width:800px; margin:0 auto">
  <h2>Portofolio</h2>
  <div style="margin-top:10px; margin-bottom:30px; font-family:var(--font-mono)">
    <span style="color:var(--text-muted)">Trading Balance:</span> 
    <span style="font-size:1.5rem; font-weight:bold; color:var(--accent-green)">{{fmtRupiah .User.CashBalance}}</span>
  </div>

  {{if .Items}}
  <table class="table-glass">
    <thead>
      <tr>
        <th>Kode</th>
        <th class="text-right">Qty (Lot)</th>
        <th class="text-right">Harga Rata-rata</th>
        <th class="text-center">Aksi</th>
      </tr>
    </thead>
    <tbody>
      {{range .Items}}
      <tr>
        <td><span class="ticker-badge">{{.Ticker}}</span></td>
        <td class="text-right num">{{.QtyLot}}</td>
        <td class="text-right num">{{fmtRupiah .AvgPrice}}</td>
        <td class="text-center">
          <a href="/orderbook?ticker={{.Ticker}}" class="btn btn-danger" style="padding:4px 8px; font-size:0.75rem;">JUAL</a>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
  {{else}}
  <div class="text-center" style="padding:40px; color:var(--text-muted)">
    Anda belum memiliki saham apapun.
  </div>
  {{end}}
</div>
{{end}}
